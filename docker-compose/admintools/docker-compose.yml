# adminTools — WebUI + DB to manage Sakura/onamae mail accounts, synced to the
# Sakura control panel via headless Playwright (replaces the Excel-driven scripts).
#
# Deployed on docker-mac-pro at ~/stacks/admintools.
#   admintools     host :8090 -> :8000  (WebUI + API)
#   admintools-db  internal Postgres (account store)

services:
  admintools-db:
    image: postgres:17-alpine
    container_name: admintools-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=admintools
      - POSTGRES_USER=admintools
      - POSTGRES_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - admintools-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admintools"]
      interval: 10s
      timeout: 5s
      retries: 5

  admintools:
    build: .
    image: ckk-admintools
    container_name: admintools
    restart: unless-stopped
    depends_on:
      admintools-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+psycopg://admintools:${DB_PASSWORD:?set DB_PASSWORD in .env}@admintools-db:5432/admintools
      # Sakura RS control-panel login — needed only for the sync action.
      - SAKURA_ID=${SAKURA_ID:-}
      - SAKURA_PW=${SAKURA_PW:-}
      # API key for the external read/write JSON API (X-API-Key). Empty = API off.
      - ADMINTOOLS_API_KEY=${ADMINTOOLS_API_KEY:-}
    ports:
      - "8090:8000"

volumes:
  admintools-db-data:
