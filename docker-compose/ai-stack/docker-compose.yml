# AI stack — Ollama (LLM/VLM) + Open WebUI + PDF→JSON extractor.
#
# Deployed on host `docker-mac-pro` (kaiseisawada@192.168.50.15) under ~/ai-stack.
# This file is the source of truth; copy the directory to the host and run
# `docker compose up -d` to recreate the stack. See README.md for full notes.
#
# Services / published ports:
#   ollama      11434  — model runtime (OpenAI/Ollama API)
#   open-webui   3000  — chat GUI (container 8080)
#   po-extract   8000  — FastAPI document→JSON endpoint (see ./extractor)

services:
  # Ollama built for AMD GPUs (ROCm 7.1) with vision-language support.
  # The /dev/kfd + /dev/dri device passthrough and cgroup rule are required
  # for ROCm GPU acceleration; drop them to fall back to CPU on other hosts.
  ollama:
    image: xxdoman/ollama-amd-rocm71-vl:latest
    container_name: ollama
    restart: unless-stopped
    devices:
      - /dev/kfd
    device_cgroup_rules:
      - 'c 226:* rmw'
    volumes:
      - /dev/dri:/dev/dri
      - ollama:/models
    environment:
      - OLLAMA_MODELS=/models
      # Default context window. 4096 is too small for a thinking model + injected
      # web-search context (the context gets truncated before the answer). 16k fits
      # comfortably in the 32GB GPUs.
      - OLLAMA_CONTEXT_LENGTH=16384
    ports:
      - "11434:11434"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
      - searxng
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Default chat model: small, fast, non-thinking (qwen3:32b stays selectable
      # for max quality). Must be pulled into the ollama volume.
      - DEFAULT_MODELS=qwen2.5:7b
      # Background tasks (search-query generation, titles, tags) use the same
      # small, non-thinking model — qwen3's <think> output breaks query parsing.
      - TASK_MODEL=qwen2.5:7b
      # Web search (internet access) via the local SearXNG instance — no API keys.
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - WEB_SEARCH_RESULT_COUNT=5
      - WEB_SEARCH_CONCURRENT_REQUESTS=10
      # Inject search results straight into the prompt instead of the RAG
      # embed→retrieve path (which the model was ignoring). Snippets only keeps
      # the injected context compact so it can't be truncated.
      - BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL=true
      - BYPASS_WEB_SEARCH_WEB_LOADER=true
      # Fetch & read page contents for URLs pasted directly in chat.
      - ENABLE_WEB_LOADER=true
      # AD/LDAP login via the vpn-ldap forwarder. All LDAP connection + bind config
      # comes from the shared ../vpn-ldap/ldap.env (env_file); just toggle it on here.
      - ENABLE_LDAP=true
    env_file:
      - ../vpn-ldap/ldap.env
    volumes:
      - open-webui:/app/backend/data
    ports:
      - "3000:8080"
    networks:
      - default     # ai-stack_default (ollama, searxng)
      - ldap        # vpn-ldap_default — reach vpn-ldap:389 (segmented)

  # Private metasearch engine providing Open WebUI's web search (no API keys).
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    # No published port — reached internally by open-webui at http://searxng:8080.

  # Document → JSON extraction API. Renders PDF pages to images and asks the
  # vision model (MODEL) to fill a caller-supplied JSON Schema. Source: ./extractor.
  po-extract:
    build: ./extractor
    image: ai-stack-po-extract
    container_name: po-extract
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL=qwen2.5vl
    ports:
      - "8000:8000"

volumes:
  ollama:
  open-webui:

networks:
  # Segmented LDAP network owned by the vpn-ldap stack; only open-webui joins it.
  ldap:
    external: true
    name: vpn-ldap_default
