# Cloudflare Tunnel connector — public access via Cloudflare.
#
# Remotely-managed (token) tunnel. Public hostname -> service mappings are
# configured in the Cloudflare Zero Trust dashboard; this connector just needs
# network reachability to each target. No public ports / port-forwarding.
#   ckk-dev.kai-lab.net  -> http://web:3000        (nextjs-web dev app via socat
#                                                   relay -> Coolify :3004;
#                                                   dev.kai-lab.net = legacy alias)
#   ckk.kai-lab.net      -> http://web-main:3000   (nextjs-web main/production app
#                                                   via relay -> Coolify :3005)
#   deploy.ckk-tool.co.jp        -> http://coolify:8080          (Coolify dashboard;
#   deploy.ckk-tool.co.jp/app/*  -> http://coolify-realtime:6001  realtime websocket.
#                                   Protect with Cloudflare Access — full deploy
#                                   rights. Also enables GitHub push auto-deploy
#                                   webhooks at /webhooks/source/github/events/manual)
#   dock.kai-lab.net     -> http://dockge:5001     (portainer, via kept dockge alias)
#   chat.kai-lab.net     -> http://open-webui:8080 (ai-stack — Open WebUI GUI)
#   monitor.kai-lab.net  -> http://grafana:3000    (monitoring stack — Grafana)
#   bi.ckk-tool.co.jp    -> http://metabase:3000   (metabase stack — BI)
#   db.ckk-tool.co.jp    -> http://prisma-studio:5555 (prisma-studio — DB browser)
#   admin.ckk-tool.co.jp -> http://admintools:8000  (admintools — admin portal)
# Ollama (:11434) is NOT published — Open WebUI reaches it internally over ai-stack.
#
# Deployed on docker-mac-pro at ~/stacks/cloudflared (Dockge-managed).
# Token lives in .env (gitignored).

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - web         # nextjs-web `web:3000`
      - dockge      # dockge `dockge:5001`
      - ai-stack    # ai-stack `open-webui:8080` (ollama reached internally by open-webui)
      - monitoring  # monitoring `grafana:3000`
      - metabase    # metabase `metabase:3000`
      - admintools   # admintools `admintools:8000`
      - shareddb    # prisma-studio `prisma-studio:5555`
      - coolify     # coolify `coolify:8080` + `coolify-realtime:6001` (deploy.ckk-tool.co.jp)

# Attach to each target stack's compose network so the tunnel can resolve them.
networks:
  web:
    external: true
    name: nextjs-web_default
  dockge:
    external: true
    name: dockge_default
  ai-stack:
    external: true
    name: ai-stack_default
  monitoring:
    external: true
    name: monitoring_monitoring
  metabase:
    external: true
    name: metabase_default
  admintools:
    external: true
    name: admintools_default
  shareddb:
    external: true
    name: shared-db
  coolify:
    external: true
    name: coolify
