# CKK db-backup — scheduled PG17 incremental base backups of shared-db.
#
# One loop container ticks at the top of every hour (kot-import style):
#   daily/YYYY-MM-DD/      full pg_basebackup      — kept DAILY_KEEP_DAYS (14)
#   hourly/YYYY-MM-DDTHH/  incremental (vs newest full) — kept HOURLY_KEEP_HOURS (72)
#   monthly/YYYY-MM/       hardlink promote of the month's first daily full
#                                                  — kept MONTHLY_KEEP (12)
#
# Backups land on the host at ${BACKUP_DIR:-/data/db-backups} (create it once:
# `sudo mkdir -p /data/db-backups && sudo chown 70:70 /data/db-backups`).
# Restore runbook + one-time shared-db migration steps: see README.md.

services:
  db-backup:
    build: .
    image: ckk-db-backup
    container_name: db-backup
    restart: unless-stopped
    user: "70:70" # postgres uid/gid in the alpine image; matches BACKUP_DIR chown
    environment:
      - PGHOST=shared-db
      - PGUSER=backup
      - PGPASSWORD=${BACKUP_DB_PASSWORD:?set BACKUP_DB_PASSWORD in .env}
      - TZ=${TZ:-Asia/Tokyo} # daily/monthly boundaries in local time
      - BACKUP_ROOT=/backups
      - HOURLY_KEEP_HOURS=${HOURLY_KEEP_HOURS:-72}
      - DAILY_KEEP_DAYS=${DAILY_KEEP_DAYS:-14}
      - MONTHLY_KEEP=${MONTHLY_KEEP:-12}
    volumes:
      - ${BACKUP_DIR:-/data/db-backups}:/backups
    networks:
      - shareddb

  # 日次の論理バックアップ（pg_dump カスタム形式）。restore-agent がワンクリック
  # 復元できる自己完結スナップショット（物理 basebackup とは別レイヤ）。
  # LOGICAL_DB_URL 未設定なら待機のみ（安全に無効）。
  logical-dump:
    build: . # db-backup と同じ pg17 クライアント入りイメージ（同一コンテキスト → キャッシュ共有）
    image: ckk-db-backup
    container_name: logical-dump
    restart: unless-stopped
    user: "70:70"
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - LOGICAL_DB_URL=${LOGICAL_DB_URL:-} # = restore-agent の RESTORE_DB_URL（スーパーユーザ DSN）
      - LOGICAL_KEEP_DAYS=${LOGICAL_KEEP_DAYS:-14}
      - LOGICAL_MONTHLY_KEEP=${LOGICAL_MONTHLY_KEEP:-12}
    entrypoint: ["/bin/bash", "/logical-dump.sh"]
    volumes:
      - ./logical-dump.sh:/logical-dump.sh:ro
      - ${BACKUP_DIR:-/data/db-backups}:/backups
    networks:
      - shareddb

  # 復元エグゼキュータ。admintools UI から token 付きで呼ばれ、DB（pg_restore）と
  # SeaweedFS ボリュームの復元を実行する。docker.sock を持つのはこの非公開サービス
  # のみ（web-facing の admintools はソケットに触れない）。RESTORE_AGENT_TOKEN 未設定
  # なら全操作 401、RESTORE_DB_URL 未設定なら DB 復元のみ無効。
  restore-agent:
    build: ./restore-agent
    image: ckk-restore-agent
    container_name: restore-agent
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - BACKUP_DIR=/backups
      - BACKUP_HOST_DIR=${BACKUP_DIR:-/data/db-backups} # ワンショット bind mount 用のホストパス
      - RESTORE_AGENT_TOKEN=${RESTORE_AGENT_TOKEN:-}
      - RESTORE_DB_URL=${RESTORE_DB_URL:-} # ckk へのスーパーユーザ DSN（空 = DB 復元無効）
      - SEAWEED_CONTAINER=${SEAWEED_CONTAINER:-nextjs-seaweedfs}
      - SEAWEED_VOLUME=${SEAWEED_VOLUME:-nextjs-web_seaweed-data}
      - SHARED_DB_NETWORK=${SHARED_DB_NETWORK:-shared-db}
      # Coolify — 復元ポイントの git commit へアプリを戻す（空 = アプリ復元無効）
      - COOLIFY_API_URL=${COOLIFY_API_URL:-} # 例: http://coolify:8000/api/v1
      - COOLIFY_API_TOKEN=${COOLIFY_API_TOKEN:-}
      - COOLIFY_APP_NAME=${COOLIFY_APP_NAME:-nextjs-web-main}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BACKUP_DIR:-/data/db-backups}:/backups
    networks:
      - shareddb
      - coolify # Coolify API（coolify:8000）到達用

  # SeaweedFS（受注書スキャン原本・証憑・生成 PDF）の日次 tar スナップショット。
  # nextjs-web スタックの seaweed-data ボリュームを read-only でマウントする。
  seaweed-backup:
    image: alpine:3.20
    container_name: seaweed-backup
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - SEAWEED_KEEP_DAYS=${SEAWEED_KEEP_DAYS:-14}
      - SEAWEED_MONTHLY_KEEP=${SEAWEED_MONTHLY_KEEP:-12}
    entrypoint: ["/bin/sh", "/seaweed-backup.sh"]
    volumes:
      - ./seaweed-backup.sh:/seaweed-backup.sh:ro
      - seaweed-data:/seaweed-data:ro
      - ${BACKUP_DIR:-/data/db-backups}:/backups

  # オフサイト同期（rclone + inotify）— バックアップが /data/db-backups に作られた
  # 瞬間にクラウドへ copy し、04時台に日次 mirror で保持を追従。OFFSITE_REMOTE
  # 未設定時は待機のみ（安全に無効）。設定は README 参照。
  offsite-backup:
    build: ./offsite # rclone/rclone:1.68 + inotify-tools
    image: ckk-offsite-backup
    container_name: offsite-backup
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/offsite-sync.sh"]
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - OFFSITE_REMOTE=${OFFSITE_REMOTE:-}
      # rclone リモートは RCLONE_CONFIG_* 環境変数で定義（.env に置く）
      - RCLONE_CONFIG_SAKURA_TYPE=${RCLONE_CONFIG_SAKURA_TYPE:-}
      - RCLONE_CONFIG_SAKURA_HOST=${RCLONE_CONFIG_SAKURA_HOST:-}
      - RCLONE_CONFIG_SAKURA_USER=${RCLONE_CONFIG_SAKURA_USER:-}
      - RCLONE_CONFIG_SAKURA_PASS=${RCLONE_CONFIG_SAKURA_PASS:-}
      - RCLONE_CONFIG_R2_TYPE=${RCLONE_CONFIG_R2_TYPE:-}
      - RCLONE_CONFIG_R2_PROVIDER=${RCLONE_CONFIG_R2_PROVIDER:-}
      - RCLONE_CONFIG_R2_ACCESS_KEY_ID=${RCLONE_CONFIG_R2_ACCESS_KEY_ID:-}
      - RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=${RCLONE_CONFIG_R2_SECRET_ACCESS_KEY:-}
      - RCLONE_CONFIG_R2_ENDPOINT=${RCLONE_CONFIG_R2_ENDPOINT:-}
    volumes:
      - ./offsite-sync.sh:/offsite-sync.sh:ro
      - ${BACKUP_DIR:-/data/db-backups}:/backups:ro

volumes:
  seaweed-data:
    external: true
    name: nextjs-web_seaweed-data

networks:
  shareddb:
    external: true
    name: shared-db
  coolify:
    external: true
    name: coolify
