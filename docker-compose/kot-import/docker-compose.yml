# King of Time auto-importer — headless Playwright export -> Postgres (hr_records).
# Replicates kuisin/ckk-tool-compose _automation/bpo_kot, run on a schedule.
#
# Deployed on docker-mac-pro at ~/stacks/kot-import.
#   kot-import  scheduler: every KOT_INTERVAL_SECONDS, login to King of Time,
#               download the last N days CSV, upsert into hr_records.
#
# Data lives in the shared-db stack (db `ckk`, schema `kot`; role `kot` has
# search_path=kot,directory so unqualified table names keep working).
# DDL is owned by Prisma — see repo shared-db/.

services:
  kot-import:
    build: .
    image: ckk-kot-import
    container_name: kot-import
    restart: unless-stopped
    environment:
      # King of Time admin login (https://s2.ta.kingoftime.jp/admin).
      - KOT_ID=${KOT_ID:-}
      - KOT_PW=${KOT_PW:-}
      - DATABASE_URL=postgresql://kot:${DB_PASSWORD:?set DB_PASSWORD in .env}@shared-db:5432/ckk
      - KOT_INTERVAL_SECONDS=${KOT_INTERVAL_SECONDS:-21600}
      - KOT_DAYS=${KOT_DAYS:-7}
    networks:
      - default
      - shareddb

networks:
  shareddb:
    external: true
    name: shared-db
