# Starter hardware alert rules (provisioned). Edit/extend in Grafana under
# Alerting → Alert rules. Each rule queries Prometheus (refId A) and compares it
# against a threshold expression (refId C).
apiVersion: 1
groups:
  - orgId: 1
    name: Hardware
    folder: Hardware
    interval: 1m
    rules:
      - uid: gpu_temp_high
        title: GPU temperature high (>85C)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A GPU on docker-mac-pro is above 85C.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: max(amdgpu_temperature_celsius)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator: { type: gt, params: [85] }

      - uid: gpu_vram_high
        title: GPU VRAM usage high (>95%)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: A GPU's VRAM usage is above 95%.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: max(amdgpu_vram_used_bytes / amdgpu_vram_total_bytes * 100)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator: { type: gt, params: [95] }

      - uid: ram_high
        title: Host RAM usage high (>90%)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Host memory usage on docker-mac-pro is above 90%.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator: { type: gt, params: [90] }

      - uid: cpu_high
        title: Host CPU usage high (>90%)
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Host CPU usage on docker-mac-pro has been above 90% for 10m.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator: { type: gt, params: [90] }

      - uid: disk_low
        title: Disk space low (<10% free)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A filesystem on docker-mac-pro has less than 10% free space.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: min(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|ramfs|fuse.*"} / node_filesystem_size_bytes) * 100
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator: { type: lt, params: [10] }

      - uid: sensor_temp_high
        title: Host sensor temperature high (>90C)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: A hardware sensor on docker-mac-pro is above 90C.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              expr: max(node_hwmon_temp_celsius)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator: { type: gt, params: [90] }
