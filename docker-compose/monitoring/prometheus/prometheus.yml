global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node          # host CPU / RAM / disk / net / temps
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor       # per-container CPU / mem
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: amdgpu         # GPU util / VRAM / temp / power
    static_configs:
      - targets: ['gpu-exporter:9400']
