# CKK Next.js web app (BFF + UI + API).
#
# Deployed on `docker-mac-pro` under the Dockge stacks dir (~/stacks/nextjs-web).
#   web   host :3001 -> container :3000  (3000 is used by open-webui)
#
# Public access (https://dev.kai-lab.net) is handled by the separate `cloudflared`
# stack, and LAN TLS by the `nginx-proxy` stack — both reach this app over the
# auto-created `nextjs-web_default` network at http://web:3000.

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
    image: nextjs-web
    container_name: nextjs-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
