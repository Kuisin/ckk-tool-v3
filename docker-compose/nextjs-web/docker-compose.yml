# CKK Next.js web app (BFF + UI + API).
#
# Deployed on `docker-mac-pro` under the Dockge stacks dir (~/stacks/nextjs-web).
#   web   host :3001 -> container :3000  (3000 is used by open-webui)
#
# Public access (https://dev.kai-lab.net) is handled by the separate `cloudflared`
# stack, and LAN TLS by the `nginx-proxy` stack — both reach this app over the
# auto-created `nextjs-web_default` network at http://web:3000.

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
    image: nextjs-web
    container_name: nextjs-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Shared business DB (shared-db stack, db ckk, role app) via Prisma Client.
      - DATABASE_URL=postgresql://app:${APP_DB_PASSWORD:?set APP_DB_PASSWORD in .env}@shared-db:5432/ckk
      # PDF generation (見積書 etc.) → Gotenberg over the stack network.
      - GOTENBERG_URL=http://gotenberg:3000
      # Generated-PDF storage (view/download) → SeaweedFS filer.
      - SEAWEED_FILER_URL=http://seaweedfs:8888
      # Document extraction (受注請書 AI取込) → po-extract on the ai-stack network.
      - PO_EXTRACT_URL=http://po-extract:8000
    depends_on:
      - gotenberg
      - seaweedfs
    networks:
      - default
      - aistack
      - shareddb
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # HTML → PDF rendering (Chromium). Internal only; reached at http://gotenberg:3000.
  gotenberg:
    image: gotenberg/gotenberg:8.17
    container_name: nextjs-gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # File storage for generated documents (PDFs). SeaweedFS S3/Filer; the app
  # writes/reads via the Filer HTTP API at http://seaweedfs:8888. Data persists
  # in the seaweed-data volume. Internal only (not published to the host).
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: nextjs-seaweedfs
    restart: unless-stopped
    command: "server -dir=/data -filer -s3 -volume.max=0 -master.volumeSizeLimitMB=1024"
    volumes:
      - seaweed-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  seaweed-data:

networks:
  # Stack-local network (web ↔ gotenberg ↔ seaweedfs).
  default:
  # ai-stack network — lets `web` reach the po-extract document extractor.
  aistack:
    external: true
    name: ai-stack_default
  # shared-db stack network — the shared business DB (db ckk).
  shareddb:
    external: true
    name: shared-db
