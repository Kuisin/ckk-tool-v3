# CKK Next.js web app (BFF + UI + API).
#
# Deployed on `docker-mac-pro` under the Dockge stacks dir (~/stacks/nextjs-web).
#   web         host :3001 -> container :3000  (3000 is used by open-webui)
#   cloudflared Cloudflare Tunnel for https://dev.kai-lab.net (profile "cloudflare")
#
# The tunnel reaches the app over the internal compose network (http://web:3000),
# so the app does NOT need a public port or router port-forwarding.

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
    image: nextjs-web
    container_name: nextjs-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Cloudflare Tunnel — remotely-managed (token) mode. Create the tunnel in the
  # Cloudflare Zero Trust dashboard, add a public hostname dev.kai-lab.net routed
  # to service http://web:3000, paste the token into .env, then start with:
  #   docker compose --profile cloudflare up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nextjs-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Required when this profile runs; left soft so it doesn't block `web` builds.
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - web
    profiles: ["cloudflare"]
