# bi.ckk-tool.co.jp -> Metabase (metabase:3000), LAN TLS termination.
# Mirrors the Cloudflare Tunnel route bi.ckk-tool.co.jp -> metabase:3000.
# TLS: *.ckk-tool.co.jp wildcard (acme.sh DNS-01). LIVE.
# Also needs: LAN DNS bi.ckk-tool.co.jp -> 192.168.50.15, and a Cloudflare Zero
# Trust public hostname bi.ckk-tool.co.jp -> http://metabase:3000.

server {
    listen 80;
    listen [::]:80;
    server_name bi.ckk-tool.co.jp;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bi.ckk-tool.co.jp;

    ssl_certificate     /etc/nginx/certs/bi.ckk-tool.co.jp.crt;
    ssl_certificate_key /etc/nginx/certs/bi.ckk-tool.co.jp.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://metabase:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
