# ckk.kai-lab.net -> nextjs-web PRODUCTION app (web-main:3000 relay -> Coolify :3005).
# Mirrors the Cloudflare Tunnel route ckk.kai-lab.net -> http://web-main:3000.
# TLS: ckk.kai-lab.net cert (SAN also covers ckk-dev.kai-lab.net).
# Also needs: LAN DNS ckk.kai-lab.net -> 192.168.50.15.
# 502 until the first `main` deployment exists (deploy.sh main).

server {
    listen 80;
    listen [::]:80;
    server_name ckk.kai-lab.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ckk.kai-lab.net;

    ssl_certificate     /etc/nginx/certs/ckk.kai-lab.net.crt;
    ssl_certificate_key /etc/nginx/certs/ckk.kai-lab.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Allow large uploads (PDFs for extraction, etc.).
    client_max_body_size 50m;

    location / {
        proxy_pass http://web-main:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket / SSE upgrade passthrough.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
