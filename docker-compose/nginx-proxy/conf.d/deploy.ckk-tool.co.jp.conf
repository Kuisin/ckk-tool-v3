# deploy.ckk-tool.co.jp -> Coolify dashboard (coolify:8080), LAN TLS termination.
# Mirrors the Cloudflare Tunnel routes:
#   deploy.ckk-tool.co.jp        -> http://coolify:8080
#   deploy.ckk-tool.co.jp/app/*  -> http://coolify-realtime:6001   (websocket)
# TLS: *.ckk-tool.co.jp wildcard, shared file _.ckk-tool.co.jp.{crt,key}.
# Also needs: LAN DNS deploy.ckk-tool.co.jp -> 192.168.50.15, and the Cloudflare
# Zero Trust public hostnames above (protect with an Access policy — this is an
# admin panel with full deploy rights).

server {
    listen 80;
    listen [::]:80;
    server_name deploy.ckk-tool.co.jp;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name deploy.ckk-tool.co.jp;

    ssl_certificate     /etc/nginx/certs/_.ckk-tool.co.jp.crt;
    ssl_certificate_key /etc/nginx/certs/_.ckk-tool.co.jp.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 100m;

    # Realtime websocket (Soketi) — live deployment logs, toasts.
    location /app/ {
        proxy_pass http://coolify-realtime:6001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # Container terminal websocket.
    location /terminal/ws {
        proxy_pass http://coolify-realtime:6002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://coolify:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
