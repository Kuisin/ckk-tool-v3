# dev.kai-lab.net -> nextjs-web `web:3000` (LAN TLS termination).

server {
    listen 80;
    listen [::]:80;
    server_name dev.kai-lab.net;
    # Redirect plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev.kai-lab.net;

    ssl_certificate     /etc/nginx/certs/dev.kai-lab.net.crt;
    ssl_certificate_key /etc/nginx/certs/dev.kai-lab.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Allow large uploads (PDFs for extraction, etc.).
    client_max_body_size 50m;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket / HMR upgrade passthrough.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
