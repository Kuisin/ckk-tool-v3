# dock.kai-lab.net -> Dockge (dockge:5001), LAN TLS termination.
# LAN access bypasses Cloudflare Access (which only enforces at CF's edge).

server {
    listen 80;
    listen [::]:80;
    server_name dock.kai-lab.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dock.kai-lab.net;

    ssl_certificate     /etc/nginx/certs/dock.kai-lab.net.crt;
    ssl_certificate_key /etc/nginx/certs/dock.kai-lab.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://dockge:5001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;   # Dockge socket.io (WS)
        proxy_set_header Connection        "upgrade";
    }
}
