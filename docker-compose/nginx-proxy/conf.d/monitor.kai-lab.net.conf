# monitor.kai-lab.net -> Grafana (grafana:3000), LAN TLS termination.

server {
    listen 80;
    listen [::]:80;
    server_name monitor.kai-lab.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name monitor.kai-lab.net;

    ssl_certificate     /etc/nginx/certs/monitor.kai-lab.net.crt;
    ssl_certificate_key /etc/nginx/certs/monitor.kai-lab.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;   # Grafana Live (WS)
        proxy_set_header Connection        "upgrade";
    }
}
