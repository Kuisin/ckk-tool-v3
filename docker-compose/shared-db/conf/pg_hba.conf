# pg_hba.conf for shared-db — mounted via `-c hba_file=/etc/postgresql/pg_hba.conf`.
#
# Mirrors what initdb + the official postgres entrypoint generate (local trust,
# loopback trust, network scram) and adds one rule so the db-backup stack's
# `backup` role can open replication connections (pg_basebackup) over the
# Docker network. The image default only allows replication from localhost;
# the appended `host all all all scram-sha-256` does NOT cover replication.
#
# Reachability is limited to the `shared-db` / `coolify` Docker networks and
# the LAN-published migration port; password auth still applies everywhere.
#
# TYPE    DATABASE      USER      ADDRESS         METHOD

# local connections (docker-entrypoint init scripts, docker exec psql)
local     all           all                       trust
host      all           all       127.0.0.1/32    trust
host      all           all       ::1/128         trust

# local replication (initdb defaults)
local     replication   all                       trust
host      replication   all       127.0.0.1/32    trust
host      replication   all       ::1/128         trust

# db-backup stack: pg_basebackup replication connections as `backup`
host      replication   backup    all             scram-sha-256

# all other network connections (entrypoint-appended default)
host      all           all       all             scram-sha-256
